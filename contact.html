<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Algets S</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:#f4f6fb;
color:#333;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
background:#1e293b;
}

nav h2{
color:#f5f6f8;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:25px;
}

nav ul li a{
text-decoration:none;
color:#e5e7eb;
font-size:15px;
transition:.3s;
}

nav ul li a:hover{
color:#3b82f6;
}

/* CONTACT SECTION */

.contact{
padding:70px 80px;
max-width:1100px;
margin-top: -50px;
}

.contact h1{
font-size:40px;
margin-bottom:40px;
text-align:center;
color:#1e293b;
}

/* GRID */

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

/* CONTACT INFO */

.contact-info{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.contact-info h3{
margin-bottom:20px;
color:#1e293b;
}

.contact-item a{
text-decoration:none;
color:#475569;
transition:0.3s;
}

.contact-item a:hover{
color:#3b82f6;
}
.contact-item{
margin-bottom:15px;
display:flex;
align-items:center;
gap:10px;
color:#475569;
}

.contact-item i{
color:#3b82f6;
}

/* FORM */

.contact-form{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
}

.contact-form textarea{
height:120px;
resize:none;
}

.contact-form button{
background:#3b82f6;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.contact-form button:hover{
background:#2563eb;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#1e293b;
color:#cbd5f5;
/* margin-top:60px; */
}

/* MOBILE */

@media(max-width:900px){

nav{
padding:18px 30px;
}

.contact{
padding:50px 30px;
}

.contact-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<nav>

<h2>Algets</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>


<section class="contact">

<h1>Contact Me</h1>

<div class="contact-grid">

<!-- CONTACT INFO -->

<div class="contact-info">

<h3>Get in Touch</h3>

<div class="contact-item">
<i class="fa-solid fa-envelope"></i>
<a href="mailto:algetes2004@gmail.com">algetes2004@gmail.com</a>
</div>


<div class="contact-item">
<i class="fa-solid fa-phone"></i>
<span>936 111 9656</span>
</div>

<div class="contact-item">
<i class="fa-solid fa-location-dot"></i>
<span>Ariyalur, Tamil Nadu</span>
</div>



<div class="contact-item">
<i class="fa-brands fa-github"></i>
<a href="https://github.com/Algets07" target="_blank">
github
</a>
</div>

<div class="contact-item">
<i class="fa-brands fa-linkedin"></i>
<a href="https://www.linkedin.com/in/algets-s-4b6762304" target="_blank">
linkedin
</a>
</div>

</div>


<!-- CONTACT FORM -->

<div class="contact-form">

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</section>


<footer>
© 2026 Algets S 
</footer>


<script>

/* FORM VALIDATION */

document.getElementById("contactForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let message = document.getElementById("message").value;

if(name === "" || email === "" || message === ""){
alert("Please fill all fields");
return;
}

alert("Thank you! Your message has been submitted.");

document.getElementById("contactForm").reset();

});

</script>

</body>
</html>
